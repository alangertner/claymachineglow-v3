<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#000;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  color:#f5f5f5;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
body{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:default;
}

.title{
  font-size:clamp(10px,2.5vw,13px);
  font-weight:300;
  letter-spacing:0.5em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.25);
  margin-bottom:80px;
  opacity:0;
  animation:fadeIn 1.2s ease-out 0.3s forwards;
}

.choices{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
}

.choice{
  display:block;
  text-decoration:none;
  text-align:center;
  padding:28px 48px;
  position:relative;
  opacity:0;
  transform:translateY(20px);
}
.choice:nth-child(1){animation:fadeUp 0.8s ease-out 0.8s forwards}
.choice:nth-child(2){animation:fadeUp 0.8s ease-out 1.1s forwards}
.choice:nth-child(3){animation:fadeUp 0.8s ease-out 1.4s forwards}

.choice .label{
  font-size:clamp(14px,3.5vw,20px);
  font-weight:300;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.5);
  transition:color 0.4s ease-out, letter-spacing 0.4s ease-out;
}

.choice:hover .label{
  color:#f5f5f5;
  letter-spacing:0.3em;
}

.choice .sub{
  display:block;
  margin-top:8px;
  font-size:10px;
  font-weight:300;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.1);
  transition:color 0.4s ease-out;
}
.choice:hover .sub{
  color:rgba(201,162,39,0.5);
}

.divider{
  width:30px;
  height:1px;
  background:rgba(255,255,255,0.06);
  margin:0 auto;
  opacity:0;
  animation:fadeIn 1s ease-out 1.3s forwards;
}
.divider:last-of-type{
  animation-delay:1.6s;
}

.dot{
  width:4px;height:4px;
  border-radius:50%;
  background:rgba(201,162,39,0.3);
  margin:60px auto 0;
  opacity:0;
  animation:fadeIn 1s ease-out 2s forwards;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

<div class="title">Clay Machine Glow</div>

<div class="choices">
  <a href="physical.html" class="choice">
    <span class="label">Physical Reality</span>
    <span class="sub">Go outside</span>
  </a>
  <div class="divider"></div>
  <a href="presence.html" class="choice">
    <span class="label">Simulated Reality</span>
    <span class="sub">Look closely</span>
  </a>
  <div class="divider"></div>
  <a href="https://alangertner.github.io/claymachineglow/" class="choice">
    <span class="label">Symbolic Reality</span>
    <span class="sub">Find the pattern</span>
  </a>
</div>

<div class="dot"></div>

</body>
</html>
