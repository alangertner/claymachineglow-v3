<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clay Machine Glow</title>
<meta name="description" content="A project to get you excited about reality.">
<meta name="theme-color" content="#000000">
<meta property="og:title" content="Clay Machine Glow">
<meta property="og:description" content="Pick any door. The highest resolution is outside.">
<meta property="og:image" content="https://alangertner.github.io/claymachineglow-v3/og-image.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMTQiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI2M5YTIyNyIgc3Ryb2tlLXdpZHRoPSIyIi8+PGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMyIgZmlsbD0iI2M5YTIyNyIvPjwvc3ZnPg==">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#000;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  color:#f5f5f5;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
body{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* === DOT === */
#dot{
  width:12px;height:12px;
  background:#c9a227;
  border-radius:50%;
  cursor:pointer;
  z-index:10;
  transition:width 0.8s cubic-bezier(0.16,1,0.3,1), height 0.8s cubic-bezier(0.16,1,0.3,1), box-shadow 1s ease-out, opacity 0.8s ease-out;
  box-shadow:0 0 20px rgba(201,162,39,0.3);
  animation:pulse 2.5s ease-in-out infinite;
  flex-shrink:0;
}
#dot.s1{width:20px;height:20px;animation:pulse 2.5s ease-in-out infinite}
#dot.s2{width:32px;height:32px;animation:pulse 2.2s ease-in-out infinite}
#dot.s3{width:48px;height:48px;animation:pulse 2s ease-in-out infinite}
#dot.s4{opacity:0;width:0;height:0;pointer-events:none;animation:none}

@keyframes pulse{
  0%,100%{transform:scale(1);box-shadow:0 0 15px rgba(201,162,39,0.2)}
  50%{transform:scale(2.5);box-shadow:0 0 70px rgba(201,162,39,0.9)}
}

/* === TEXT ABOVE DOT === */
#text-area{
  height:80px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  margin-bottom:50px;
  text-align:center;
  padding:0 30px;
  transition:opacity 0.6s ease-out;
}
.text-content{
  opacity:0;
  transition:opacity 0.8s ease-out;
  position:absolute;
}
.text-content.visible{opacity:1}

.text-title{
  font-size:clamp(11px,2.5vw,14px);
  font-weight:300;
  letter-spacing:0.4em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.5);
}
.text-line{
  font-size:clamp(15px,3.2vw,20px);
  font-weight:200;
  letter-spacing:0.03em;
  line-height:1.6;
  color:rgba(255,255,255,0.6);
}

#below-dot{
  height:80px;
  margin-top:30px;
  transition:opacity 0.6s ease-out;
}

#hint{
  opacity:0;
  font-size:11px;
  font-weight:300;
  letter-spacing:0.35em;
  text-transform:lowercase;
  color:rgba(201,162,39,0.4);
  transition:opacity 1.2s ease-out;
  pointer-events:none;
  margin-top:20px;
}
#hint.visible{opacity:1}

/* === DOORS === */
#doors{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:clamp(16px,4vw,40px);
  pointer-events:none;
  opacity:0;
  transition:opacity 1s ease-out;
  z-index:20;
}
#doors.visible{opacity:1;pointer-events:auto}

.door{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-decoration:none;
  opacity:0;
  transform:translateY(30px);
  transition:opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.16,1,0.3,1);
}
.door.visible{opacity:1;transform:translateY(0)}

.door svg{
  width:clamp(60px,12vw,100px);
  height:clamp(120px,24vw,200px);
  transition:transform 0.3s ease-out;
}
.door:hover svg{transform:scale(1.04)}
.door:hover .door-frame{stroke:rgba(255,255,255,0.35)}
.door:hover .door-knob{fill:#c9a227;filter:drop-shadow(0 0 8px rgba(201,162,39,0.6))}

.door-frame{
  stroke:rgba(255,255,255,0.15);
  stroke-width:1.5;
  fill:none;
  transition:stroke 0.3s;
}
.door-knob{
  fill:rgba(201,162,39,0.6);
  transition:fill 0.3s, filter 0.3s;
}

.door-label{
  margin-top:14px;
  font-size:clamp(9px,2vw,12px);
  font-weight:300;
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.35);
  transition:color 0.3s;
}
.door:hover .door-label{color:rgba(255,255,255,0.7)}

.door-sub{
  margin-top:5px;
  font-size:clamp(7px,1.5vw,9px);
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.08);
  transition:color 0.3s;
}
.door:hover .door-sub{color:rgba(201,162,39,0.4)}

@media (hover:none){
  .door-label{color:rgba(255,255,255,0.5)}
  .door-sub{color:rgba(201,162,39,0.35)}
}
</style>
</head>
<body>

<div id="text-area">
  <div class="text-content" id="t0"><span class="text-title">Clay Machine Glow</span></div>
  <div class="text-content" id="t1"><span class="text-line">A project to get you<br>excited about reality</span></div>
  <div class="text-content" id="t2"><span class="text-line">The highest resolution is outside.<br>Until then, pick any door.</span></div>
</div>

<div id="dot"></div>

<div id="below-dot">
  <div id="hint">click the dot</div>
</div>

<div id="doors">
  <a href="physical.html" class="door" id="d0">
    <svg viewBox="0 0 60 120">
      <rect class="door-frame" x="4" y="4" width="52" height="112" rx="2"/>
      <rect class="door-frame" x="8" y="8" width="44" height="104" rx="1"/>
      <line class="door-frame" x1="8" y1="56" x2="52" y2="56"/>
      <circle class="door-knob" cx="44" cy="68" r="4"/>
    </svg>
    <span class="door-label">Physical</span>
    <span class="door-sub">Go outside</span>
  </a>
  <a href="presence.html" class="door" id="d1">
    <svg viewBox="0 0 60 120">
      <rect class="door-frame" x="4" y="4" width="52" height="112" rx="2"/>
      <rect class="door-frame" x="8" y="8" width="44" height="104" rx="1"/>
      <line class="door-frame" x1="8" y1="56" x2="52" y2="56"/>
      <circle class="door-knob" cx="44" cy="68" r="4"/>
    </svg>
    <span class="door-label">Simulated</span>
    <span class="door-sub">It's not real</span>
  </a>
  <a href="https://alangertner.github.io/claymachineglow/" class="door" id="d2">
    <svg viewBox="0 0 60 120">
      <rect class="door-frame" x="4" y="4" width="52" height="112" rx="2"/>
      <rect class="door-frame" x="8" y="8" width="44" height="104" rx="1"/>
      <line class="door-frame" x1="8" y1="56" x2="52" y2="56"/>
      <circle class="door-knob" cx="44" cy="68" r="4"/>
    </svg>
    <span class="door-label">Symbolic</span>
    <span class="door-sub">Nothing is real</span>
  </a>
  <a href="https://alangertner.github.io/claymachineglow-ludic/" class="door" id="d3">
    <svg viewBox="0 0 60 120">
      <rect class="door-frame" x="4" y="4" width="52" height="112" rx="2"/>
      <rect class="door-frame" x="8" y="8" width="44" height="104" rx="1"/>
      <line class="door-frame" x1="8" y1="56" x2="52" y2="56"/>
      <circle class="door-knob" cx="44" cy="68" r="4"/>
    </svg>
    <span class="door-label">Ludic</span>
    <span class="door-sub">Play along</span>
  </a>
</div>

<script>
let stage = 0;
let pulseCount = 0;
const hint = document.getElementById('hint');

// Count pulses via animation iteration, show hint after 5
dot.addEventListener('animationiteration', () => {
  if (stage === 0) {
    pulseCount++;
    if (pulseCount >= 3) hint.classList.add('visible');
  }
});
const dot = document.getElementById('dot');
const doorsEl = document.getElementById('doors');
const texts = [
  document.getElementById('t0'),
  document.getElementById('t1'),
  document.getElementById('t2'),
];
const doors = document.querySelectorAll('.door');

dot.addEventListener('click', () => {
  stage++;
  texts.forEach(t => t.classList.remove('visible'));

  hint.classList.remove('visible');

  if (stage === 1) {
    dot.className = 's1'; dot.id = 'dot';
    setTimeout(() => texts[0].classList.add('visible'), 200);
  }
  else if (stage === 2) {
    dot.className = 's2'; dot.id = 'dot';
    setTimeout(() => texts[1].classList.add('visible'), 300);
  }
  else if (stage === 3) {
    dot.className = 's3'; dot.id = 'dot';
    setTimeout(() => texts[2].classList.add('visible'), 300);
  }
  else if (stage === 4) {
    dot.className = 's4'; dot.id = 'dot';
    document.getElementById('text-area').style.opacity = '0';
    document.getElementById('below-dot').style.opacity = '0';

    setTimeout(() => doorsEl.classList.add('visible'), 300);

    doors.forEach((d, i) => {
      setTimeout(() => d.classList.add('visible'), 500 + i * 200);
    });
  }
});
</script>
</body>
</html>
