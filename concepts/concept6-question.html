<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
.question{font-size:clamp(14px,3vw,20px);font-weight:200;color:rgba(255,255,255,0.4);letter-spacing:0.06em;margin-bottom:40px}
.row{display:flex;align-items:center;gap:0}
.row a{text-decoration:none;font-size:clamp(11px,2.5vw,14px);font-weight:300;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.3);padding:8px 16px;transition:color 0.3s}
.row a:hover{color:#f5f5f5}
.sep{color:rgba(255,255,255,0.08);font-size:10px}
.footer{position:fixed;bottom:25px;font-size:8px;letter-spacing:0.4em;text-transform:uppercase;color:rgba(255,255,255,0.06)}
</style></head><body>
<div class="question">How do you want to see it?</div>
<div class="row">
  <a href="#">Physical</a><span class="sep">·</span>
  <a href="#">Simulated</a><span class="sep">·</span>
  <a href="#">Symbolic</a><span class="sep">·</span>
  <a href="#">Ludic</a>
</div>
<div class="footer">Clay Machine Glow</div>
</body></html>
