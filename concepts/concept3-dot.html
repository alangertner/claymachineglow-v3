<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;overflow:hidden;cursor:crosshair}
.center-dot{width:8px;height:8px;background:#c9a227;border-radius:50%;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 30px rgba(201,162,39,0.3);z-index:10}
.quadrant{position:fixed;display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;transition:opacity 0.6s}
.quadrant a{text-decoration:none;color:rgba(255,255,255,0.5);font-size:14px;font-weight:300;letter-spacing:0.2em;text-transform:uppercase;transition:color 0.3s}
.quadrant a:hover{color:#f5f5f5}
.quadrant .sub{font-size:9px;color:rgba(255,255,255,0.15);letter-spacing:0.2em;margin-top:6px}
.q-tl{top:20%;left:20%}
.q-tr{top:20%;right:20%}
.q-bl{bottom:20%;left:20%}
.q-br{bottom:20%;right:20%}
</style></head><body>
<div class="center-dot"></div>
<div class="quadrant q-tl" id="q1"><a href="#">Physical</a><div class="sub">Go outside</div></div>
<div class="quadrant q-tr" id="q2"><a href="#">Simulated</a><div class="sub">It's not real</div></div>
<div class="quadrant q-bl" id="q3"><a href="#">Ludic</a><div class="sub">Play along</div></div>
<div class="quadrant q-br" id="q4"><a href="#">Symbolic</a><div class="sub">Nothing is real</div></div>
<script>
const cx=window.innerWidth/2,cy=window.innerHeight/2;
document.addEventListener('mousemove',e=>{
  const dx=e.clientX-cx,dy=e.clientY-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const maxDist=Math.min(cx,cy);
  const prox=Math.max(0,1-dist/maxDist);
  document.querySelectorAll('.quadrant').forEach(q=>q.style.opacity=prox);
});
</script>
</body></html>
