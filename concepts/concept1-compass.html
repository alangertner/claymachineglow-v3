<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center}
.dot{width:6px;height:6px;background:#c9a227;border-radius:50%;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px rgba(201,162,39,0.3)}
a{text-decoration:none;position:fixed;font-size:13px;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.35);transition:color 0.4s,letter-spacing 0.3s}
a:hover{color:#f5f5f5;letter-spacing:0.4em}
.n{top:15%;left:50%;transform:translateX(-50%)}
.s{bottom:15%;left:50%;transform:translateX(-50%)}
.w{left:8%;top:50%;transform:translateY(-50%)}
.e{right:8%;top:50%;transform:translateY(-50%)}
.sub{display:block;text-align:center;margin-top:6px;font-size:9px;letter-spacing:0.25em;color:rgba(255,255,255,0.12)}
a:hover .sub{color:rgba(201,162,39,0.4)}
</style></head><body>
<div class="dot"></div>
<a href="#" class="n"><span>Physical</span><span class="sub">Go outside</span></a>
<a href="#" class="e"><span>Simulated</span><span class="sub">It's not real</span></a>
<a href="#" class="s"><span>Symbolic</span><span class="sub">Nothing is real</span></a>
<a href="#" class="w"><span>Ludic</span><span class="sub">Play along</span></a>
</body></html>
