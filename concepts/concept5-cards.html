<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center}
.stack{position:relative;width:280px;height:180px}
.card{position:absolute;width:280px;height:180px;border:1px solid rgba(255,255,255,0.06);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.5s cubic-bezier(0.2,0,0,1);cursor:pointer;background:rgba(255,255,255,0.02)}
.card:hover{border-color:rgba(201,162,39,0.3);background:rgba(201,162,39,0.03);transform:translateY(-100px) scale(1.02)!important}
.card .label{font-size:15px;font-weight:300;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.5)}
.card:hover .label{color:#f5f5f5}
.card .sub{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.1);margin-top:8px}
.card:hover .sub{color:rgba(201,162,39,0.4)}
.c0{top:0;z-index:4}
.c1{top:12px;z-index:3;opacity:0.8}
.c2{top:24px;z-index:2;opacity:0.6}
.c3{top:36px;z-index:1;opacity:0.4}
.title{position:fixed;bottom:30px;font-size:9px;letter-spacing:0.4em;text-transform:uppercase;color:rgba(255,255,255,0.08)}
</style></head><body>
<div class="stack">
  <a href="#" class="card c3"><span class="label">Ludic</span><span class="sub">Play along</span></a>
  <a href="#" class="card c2"><span class="label">Symbolic</span><span class="sub">Nothing is real</span></a>
  <a href="#" class="card c1"><span class="label">Simulated</span><span class="sub">It's not real</span></a>
  <a href="#" class="card c0"><span class="label">Physical</span><span class="sub">Go outside</span></a>
</div>
<div class="title">Clay Machine Glow</div>
</body></html>
