<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;overflow:hidden}
.center{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:8px;letter-spacing:0.4em;text-transform:uppercase;color:rgba(255,255,255,0.08)}
.orbit-item{position:fixed;font-size:13px;font-weight:300;letter-spacing:0.25em;text-transform:uppercase;text-decoration:none;color:rgba(255,255,255,0.4);transition:color 0.3s,transform 0.3s;transform-origin:center}
.orbit-item:hover{color:#f5f5f5;transform:scale(1.1)}
.orbit-item .sub{display:block;font-size:9px;letter-spacing:0.2em;color:rgba(255,255,255,0.1);margin-top:4px;text-align:center}
.orbit-item:hover .sub{color:rgba(201,162,39,0.4)}
</style></head><body>
<div class="center">Clay Machine Glow</div>
<a href="#" class="orbit-item" id="o0"><span>Physical</span><span class="sub">Go outside</span></a>
<a href="#" class="orbit-item" id="o1"><span>Simulated</span><span class="sub">It's not real</span></a>
<a href="#" class="orbit-item" id="o2"><span>Symbolic</span><span class="sub">Nothing is real</span></a>
<a href="#" class="orbit-item" id="o3"><span>Ludic</span><span class="sub">Play along</span></a>
<script>
const items=document.querySelectorAll('.orbit-item');
const speeds=[0.0003,0.00045,0.00025,0.00055];
const radii=[180,240,160,210];
const offsets=[0,Math.PI/2,Math.PI,Math.PI*1.5];
const cx=window.innerWidth/2,cy=window.innerHeight/2;
function animate(t){
  items.forEach((el,i)=>{
    const angle=t*speeds[i]+offsets[i];
    const x=cx+Math.cos(angle)*radii[i]-60;
    const y=cy+Math.sin(angle)*radii[i]*0.5-15;
    el.style.left=x+'px';
    el.style.top=y+'px';
  });
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body></html>
