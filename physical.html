<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physical — Clay Machine Glow</title>
<meta name="theme-color" content="#000000">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#000;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  color:#f5f5f5;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
.container{
  text-align:center;
  max-width:500px;
  padding:40px;
}
.message{
  font-size:clamp(16px,3.5vw,22px);
  font-weight:200;
  line-height:1.8;
  letter-spacing:0.04em;
  color:rgba(245,245,245,0.6);
  margin-bottom:60px;
  opacity:0;
  animation:fadeUp 1.5s ease-out 0.5s forwards;
}
.message em{
  font-style:normal;
  color:rgba(245,245,245,0.85);
}
.ticker{
  font-size:clamp(28px,7vw,48px);
  font-weight:300;
  letter-spacing:0.2em;
  color:rgba(201,162,39,0.45);
  font-variant-numeric:tabular-nums;
  opacity:0;
  animation:fadeUp 1s ease-out 1.5s forwards;
}
.back{
  position:fixed;
  top:30px;left:30px;
  font-size:10px;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.15);
  text-decoration:none;
  transition:color 0.3s;
  opacity:0;
  animation:fadeUp 0.8s ease-out 2s forwards;
}
.back:hover{color:rgba(255,255,255,0.4)}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>
<a href="index.html" class="back">← back</a>
<div class="container">
  <p class="message">
    <em>Clay remembers the hands that shaped it.</em><br><br>
    This one isn't ready yet.
  </p>
  <div class="ticker" id="ticker"></div>
</div>
<script>
const target = new Date('2026-06-01T00:00:00-04:00').getTime();
const ticker = document.getElementById('ticker');

function pad(n, d) { return String(n).padStart(d, '0'); }

function update() {
  const now = Date.now();
  const diff = Math.max(0, target - now);
  const s = Math.floor(diff / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  const hh = h % 24;
  const mm = m % 60;
  const ss = s % 60;
  const ms = Math.floor((diff % 1000) / 10);

  ticker.textContent = pad(d,3) + '.' + pad(hh,2) + '.' + pad(mm,2) + '.' + pad(ss,2) + '.' + pad(ms,2);

  if (diff > 0) requestAnimationFrame(update);
  else ticker.textContent = '· · ·';
}

update();
</script>
</body>
</html>
