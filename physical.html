<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physical — Clay Machine Glow</title>
<meta name="theme-color" content="#000000">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#000;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  color:#f5f5f5;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
.container{
  text-align:center;
  max-width:500px;
  padding:40px;
}
.message{
  font-size:clamp(18px,4vw,28px);
  font-weight:200;
  line-height:1.7;
  letter-spacing:0.03em;
  color:rgba(245,245,245,0.7);
  margin-bottom:80px;
  opacity:0;
  animation:fadeUp 1.5s ease-out 0.5s forwards;
}
.pulse{
  width:8px;height:8px;
  background:#c9a227;
  border-radius:50%;
  margin:0 auto 60px;
  opacity:0;
  animation:fadeUp 1s ease-out 1.2s forwards;
  box-shadow:0 0 20px rgba(201,162,39,0.4);
}
.pulse::after{
  content:'';
  display:block;
  width:8px;height:8px;
  border-radius:50%;
  background:rgba(201,162,39,0.3);
  animation:breathe 3s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(3);opacity:0}
}
.ticker{
  font-size:13px;
  font-weight:300;
  letter-spacing:0.5em;
  color:rgba(245,245,245,0.15);
  font-variant-numeric:tabular-nums;
  opacity:0;
  animation:fadeUp 1s ease-out 1.8s forwards;
}
.back{
  position:fixed;
  top:30px;left:30px;
  font-size:10px;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.2);
  text-decoration:none;
  transition:color 0.3s;
  opacity:0;
  animation:fadeUp 0.8s ease-out 2.5s forwards;
}
.back:hover{color:rgba(255,255,255,0.5)}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(15px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>
<a href="index.html" class="back">← back</a>
<div class="container">
  <p class="message">
    The machine exists.<br>
    Go outside and find it.
  </p>
  <div class="pulse"></div>
  <div class="ticker" id="ticker"></div>
</div>
<script>
const target = new Date('2026-06-01T00:00:00-04:00').getTime();
const ticker = document.getElementById('ticker');

function pad(n, d) { return String(n).padStart(d, '0'); }

function update() {
  const now = Date.now();
  const diff = Math.max(0, target - now);
  const s = Math.floor(diff / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);

  // Display as a single cryptic number stream — not labeled
  const hh = h % 24;
  const mm = m % 60;
  const ss = s % 60;
  const ms = Math.floor((diff % 1000) / 10);

  ticker.textContent = pad(d,3) + '.' + pad(hh,2) + '.' + pad(mm,2) + '.' + pad(ss,2) + '.' + pad(ms,2);

  if (diff > 0) requestAnimationFrame(update);
  else ticker.textContent = 'NOW';
}

update();
</script>
</body>
</html>
